<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material Price Calculator</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        input[type='text'], input[type='number'] { width: 100%; padding: 10px; margin: 5px 0; }
        button { padding: 10px; background-color: #4CAF50; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #45a049; }
        #result { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Material Price Calculator</h1>
        <form id="materialForm">
            <label for="materialName">Material Name:</label>
            <input type="text" id="materialName" required>

            <label for="materialQuantity">Quantity:</label>
            <input type="number" id="materialQuantity" required>

            <label for="materialPrice">Price per Unit:</label>
            <input type="number" id="materialPrice" required>

            <button type="button" onclick="calculatePrice()">Calculate Total Price</button>
        </form>
        <div id="result"></div>
    </div>
    <script>
        function calculatePrice() {
            const quantity = document.getElementById('materialQuantity').value;
            const price = document.getElementById('materialPrice').value;
            const totalPrice = quantity * price;
            document.getElementById('result').innerText = `Total Price: $${totalPrice.toFixed(2)}`;
        }
    </script>
</body>
</html>

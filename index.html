<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materiaal Calculator Overzicht</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 40px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th { background-color: #f8f9fa; border-bottom: 2px solid #dee2e6; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        input[type="number"] { width: 80px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .prijs-cel { font-family: monospace; font-size: 1.1em; }
        .subtotaal { font-weight: bold; color: #2980b9; }
        
        .totaal-sectie { 
            text-align: right; 
            padding: 20px; 
            background: #2c3e50; 
            color: white; 
            border-radius: 8px; 
            font-size: 1.5em; 
        }
        tr:hover { background-color: #fdfdfd; }
    </style>
</head>
<body>

<div class="container">
    <h2>Materiaallijst & Calculatie</h2>
    
    <table>
        <thead>
            <tr>
                <th>Materiaal</th>
                <th>Prijs (p/st)</th>
                <th>Aantal</th>
                <th>Subtotaal</th>
            </tr>
        </thead>
        <tbody id="materiaal-body">
            </tbody>
    </table>

    <div class="totaal-sectie">
        Eindtotaal: <span id="eindtotaal">€ 0,00</span>
    </div>
</div>

<script>
    // Hier kun je eenvoudig materialen toevoegen of prijzen aanpassen
    const materialen = [
        { naam: "Houten Balk (vuren)", prijs: 12.50 },
        { naam: "Betonmortel (25kg)", prijs: 8.95 },
        { naam: "Gipsplaat (st)", prijs: 14.20 },
        { naam: "Isolatieglas (m2)", prijs: 85.00 },
        { naam: "Baksteen (per 100)", prijs: 42.00 },
        { naam: "PVC Buis (2m)", prijs: 6.75 },
        { naam: "Laminaat (m2)", prijs: 19.95 },
        { naam: "Verf (2.5L)", prijs: 45.50 },
        { naam: "Schroeven (doos)", prijs: 11.25 },
        { naam: "Dakpannen (st)", prijs: 2.40 },
        { naam: "Zand (zak)", prijs: 4.50 },
        { naam: "Aluminium Profiel", prijs: 22.10 }
    ];

    const tabelBody = document.getElementById('materiaal-body');

    function bouwTabel() {
        materialen.forEach((item, index) => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${item.naam}</td>
                <td class="prijs-cel">€ ${item.prijs.toFixed(2).replace('.', ',')}</td>
                <td><input type="number" id="aantal-${index}" value="0" min="0" oninput="berekenAlles()"></td>
                <td class="prijs-cel subtotaal" id="sub-${index}">€ 0,00</td>
            `;
            tabelBody.appendChild(row);
        });
    }

    function berekenAlles() {
        let totaal = 0;
        materialen.forEach((item, index) => {
            const aantal = document.getElementById(`aantal-${index}`).value || 0;
            const sub = item.prijs * aantal;
            totaal += sub;
            document.getElementById(`sub-${index}`).innerText = "€ " + sub.toFixed(2).replace('.', ',');
        });
        document.getElementById('eindtotaal').innerText = "€ " + totaal.toFixed(2).replace('.', ',');
    }

    // Start de tabel op bij laden
    bouwTabel();
</script>

</body>
</html>
